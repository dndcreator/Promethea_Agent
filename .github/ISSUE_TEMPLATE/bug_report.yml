name: Bug Report
description: Report a reproducible bug
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Include exact commands and inputs.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      render: shell

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version, branch/commit

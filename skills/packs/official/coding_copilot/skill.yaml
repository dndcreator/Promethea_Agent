  "permission_profile": "default",
  "prompt_block_policy": {
    "disable": ["response_format"],
    "prefer": ["identity", "policy", "workspace", "reasoning"]
  },
  "default_mode": "deep",
  "version": "1.1.0",
  "enabled": true
}
